<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon fallback — SVG letter, no asset required -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23a855f7'/><text x='50' y='72' font-family='system-ui' font-weight='700' font-size='60' text-anchor='middle' fill='white'>F</text></svg>"
    />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Forma — Brand & Web Design for Ambitious Companies</title>
    <meta
      name="description"
      content="Forma is a brand and web design studio for early-stage and growth-stage companies. We design identities, websites, and design systems that make your product look as good as it is."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="Forma — Brand & Web Design for Ambitious Companies" />
    <meta property="og:description" content="Brand identity, websites, and design systems for early-stage and growth-stage companies." />
    <meta property="og:image" content="https://forma.studio/og-image.png" />
    <meta property="og:url" content="https://forma.studio" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Canonical -->
    <link rel="canonical" href="https://forma.studio" />

    <!-- Organization schema — entity identity for AI citation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Forma",
      "url": "https://forma.studio",
      "description": "Brand and web design studio for early-stage and growth-stage companies. We design identities, websites, and design systems.",
      "foundingDate": "2021",
      "sameAs": [
        "https://twitter.com/formastudio",
        "https://www.linkedin.com/company/formastudio",
        "https://dribbble.com/formastudio"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@forma.studio",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- Google Analytics 4 — replace G-XXXXXXXXXX with your measurement ID -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
